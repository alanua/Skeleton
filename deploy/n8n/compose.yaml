services:
  n8n:
    image: n8nio/n8n:2.29.7@sha256:e0264b531fb97c68ece58a650173bd981f1663947281013f4a46749c15a8abc5
    restart: unless-stopped
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /home/node/.cache:size=16m,uid=1000,gid=1000,mode=0700
    ports:
      - "127.0.0.1:${N8N_EDITOR_PORT:-5678}:5678"
    environment:
      DB_TYPE: sqlite
      DB_SQLITE_DATABASE: /home/node/.n8n/database.sqlite
      DB_SQLITE_POOL_SIZE: "2"
      GENERIC_TIMEZONE: Europe/Berlin
      TZ: Europe/Berlin
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?set a private 32+ character descriptor in your uncommitted env file}
      N8N_HOST: ${N8N_HOST:-127.0.0.1}
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      N8N_TEMPLATES_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      EXTERNAL_FRONTEND_HOOKS_URLS: ""
      N8N_COMMUNITY_PACKAGES_ENABLED: "false"
      N8N_REINSTALL_MISSING_PACKAGES: "false"
      N8N_RUNNERS_MODE: internal
      N8N_RUNNERS_INSECURE_MODE: "false"
      N8N_RUNNERS_BROKER_LISTEN_ADDRESS: 127.0.0.1
      N8N_RUNNERS_MAX_CONCURRENCY: "1"
      N8N_RUNNERS_TASK_TIMEOUT: "60"
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "true"
      N8N_BLOCK_FILE_ACCESS_TO_N8N_FILES: "true"
      N8N_RESTRICT_FILE_ACCESS_TO: /home/node/.n8n-files-disabled
      N8N_PYTHON_ENABLED: "false"
      NODES_EXCLUDE: '["n8n-nodes-base.code","n8n-nodes-base.executeCommand","n8n-nodes-base.ssh","n8n-nodes-base.localFileTrigger","n8n-nodes-base.readWriteFile","n8n-nodes-base.readBinaryFile","n8n-nodes-base.readBinaryFiles","n8n-nodes-base.writeBinaryFile"]'
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: none
      EXECUTIONS_DATA_SAVE_ON_ERROR: all
      EXECUTIONS_DATA_SAVE_ON_PROGRESS: "false"
      EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS: "false"
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: "168"
      EXECUTIONS_DATA_PRUNE_MAX_COUNT: "10000"
    volumes:
      - type: bind
        source: ${N8N_DATA_DIR:?set an owner-only host directory for n8n data}
        target: /home/node/.n8n
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "const net=require('net');const s=net.connect(5678,'127.0.0.1');const t=setTimeout(()=>process.exit(1),3000);s.on('connect',()=>{clearTimeout(t);s.end();process.exit(0)});s.on('error',()=>process.exit(1));"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    mem_limit: 768m
    cpus: "1.00"
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 768M
