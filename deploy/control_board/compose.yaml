services:
  control-board:
    build:
      context: ../..
      dockerfile: deploy/control_board/Dockerfile
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - ./env.example
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=2).read()"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
