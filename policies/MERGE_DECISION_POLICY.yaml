version: "1.0.0"
policy_id: skeleton.merge_decision_policy.stage1
scope: stage1_foundation

decisions:
  AUTO_MERGE:
    means: "All merge conditions are satisfied, including exact operator merge approval."
  ASK_OPERATOR:
    means: "The PR may be mergeable, but needs explicit operator review first."
  NEVER_AUTO:
    means: "The PR must not be auto-merged, even if it may be valid after review."
  BLOCKED:
    means: "The PR is missing required safety evidence or has unverifiable evidence."

auto_merge_requires:
  - clean_pr
  - evidence_all_true
  - no_hard_stop_files
  - no_ask_operator_triggers
  - no_level_red_triggers
  - operator_merge_approval_valid

operator_merge_approval_requires:
  - action=merge_pull_request
  - repository_full_name
  - pull_request_number
  - expected_head_sha
  - merge_method
  - no_task_explicit_merge_prohibition_unless_superseded

hard_stop_file_patterns:
  - BOOT_MANIFEST.yaml
  - COMMANDS.yaml
  - OPERATOR_RULES.yaml
  - PROJECT_TREE.yaml
  - CAPABILITY_REGISTRY.yaml
  - PROVIDER_ROUTING.yaml
  - core/gate_engine.py
  - core/action_gate.py
  - scripts/runner_poll_github_tasks.py
  - scripts/*.service
  - scripts/*.timer
  - adapters/**
  - adapters/*/*CONTRACT.md

ask_operator_triggers:
  - execution_mode_changed
  - dirty_pr
  - architecture_direction_changed
  - external_service_added
  - cost_related_change
  - cross_repo_execution_enabled
  - live_runtime_capability_added

level_red_triggers:
  - level_red
  - secrets
  - deploy
  - runtime_service
  - force_push
  - destructive_git
  - autonomous_merge
