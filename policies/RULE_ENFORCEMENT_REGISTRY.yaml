  audit_evidence:
  - policies/DELEGATED_MERGE_POLICY.yaml:scope
  protected_actions:
  - merge_pull_request
  approval_scope: exact_pr_head_and_files
  public_private_boundary: public_only
  supersedes: []
  superseded_by: []
  notes: Advisory inventory only; not counted as active enforcement.
- rule_id: runtime_maintenance_requires_allowlisted_task
  title: Runtime maintenance requires an allowlisted task id
  source_file: scripts/runner_poll_github_tasks.py
  source_locator: dispatch_runtime_maintenance_task
  owner_component: runner_maintenance
  lifecycle: active
  enforcement: runtime_gate
  gate_entrypoint: scripts.runner_poll_github_tasks.dispatch_runtime_maintenance_task
  reason_tokens:
  - missing_runtime_maintenance_task_id
  - unknown_maintenance_task_id
  - blocked_runtime_maintenance_task
  test_evidence:
  - tests/test_runner_poll_github_tasks.py:test_hermes_worker_preflight_is_allowlisted
  audit_evidence:
