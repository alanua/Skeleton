rules:
- rule_id: merge_requires_exact_operator_approval
  title: Merge requests require exact operator approval
  source_file: core/action_gate.py
  source_locator: validate_action_request
  owner_component: action_gate
  lifecycle: active
  enforcement: runtime_gate
  gate_entrypoint: core.action_gate.validate_action_request
  reason_tokens:
  - user_approved_must_be_true
  - expected_head_sha_must_be_valid
  - expected_files_must_be_safe
  test_evidence:
  - tests/test_action_gate.py:test_allows_approved_request_bound_to_expected_pr_state
  - tests/test_merge_policy_checker.py:test_clean_routine_pr_auto_merges_when_all_evidence_true
  audit_evidence:
  - docs/ACTION_GATE.md
  - schemas/action_gate.schema.json
  protected_actions:
  - merge_pull_request
  approval_scope: exact_pr_head_and_files
  public_private_boundary: public_only
  supersedes: []
  superseded_by: []
  notes: Dry-run gate only; no merge action is enabled by this registry.
- rule_id: merge_policy_hard_stop_files_ask_operator
  title: Hard-stop merge policy files ask the operator
  source_file: policies/MERGE_DECISION_POLICY.yaml
  source_locator: hard_stop_file_patterns
  owner_component: merge_policy_checker
  lifecycle: active
  enforcement: preflight_gate
  gate_entrypoint: core.merge_policy_checker.MergePolicyChecker.check
  reason_tokens:
  - hard_stop_file_changed
  - operator_review_trigger_found
  test_evidence:
  - tests/test_merge_policy_checker.py:test_hard_stop_file_asks_operator
  audit_evidence:
  - policies/MERGE_DECISION_POLICY.yaml:hard_stop_file_patterns
  protected_actions:
  - instruction_change
  approval_scope: exact_pr_head_and_files
  public_private_boundary: public_only
  supersedes: []
  superseded_by: []
  notes: Stage 0 records the existing decision policy as preflight evidence.
- rule_id: delegated_merge_review_only
  title: Delegated merge policy remains review-only
  source_file: policies/DELEGATED_MERGE_POLICY.yaml
  source_locator: scope
  owner_component: merge_policy_checker
  lifecycle: advisory
  enforcement: documentation_only
  gate_entrypoint: policies/DELEGATED_MERGE_POLICY.yaml:scope
  reason_tokens:
  - review_trigger_found
  test_evidence:
