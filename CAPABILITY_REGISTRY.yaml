version: "1.0.0"
capabilities:
  boot_manifest:
    status: available
    module: BOOT_MANIFEST.yaml
    tested: true
    added: "2026-05-18"
    description: Single Skeleton boot entrypoint.

  command_modes:
    status: available
    module: COMMANDS.yaml
    tested: true
    added: "2026-05-18"
    description: Declared command-to-mode routing.

  memory_routing:
    status: available
    module: MEMORY_ROUTING.yaml
    tested: true
    added: "2026-05-18"
    description: Memory trust and override routing.

  project_manifests:
    status: available
    module: PROJECT_INDEX.yaml
    tested: true
    added: "2026-05-18"
    description: Project index and project-level manifest routing.

  adapter_contracts:
    status: available
    module: adapters/
    tested: true
    added: "2026-05-18"
    description: Adapter contracts for model/runtime roles.

  write_gate:
    status: available
    module: core/gate_engine.py
    entry: GateEngine.check_patch_plan
    requires:
      - schemas/patch_plan.schema.json
      - core/patch_validator.py
    tested: true
    added: "2026-05-18"
    description: Enforces PatchPlan validation, read confirmation, operator approval, and verification gate.

  boot_loader:
    status: available
    module: core/boot_loader.py
    tested: true
    description: Reads BOOT_MANIFEST, validates sources, and produces BootReport.

  provider_routing:
    status: available
    module: PROVIDER_ROUTING.yaml
    tested: true
    added: "2026-05-19"
    description: Machine-readable provider routing policy defining local, free_cloud, paid_cloud, and gemini_audit tiers with cost controls.

  project_loader:
    status: available
    module: core/project_loader.py
    tested: true
    description: Activates project context after operator command.

  project_tree:
    status: available
    module: core/project_tree.py
    entry: load_project_tree
    stage: stage_1_metadata
    live_runtime_execution: false
    requires:
      - PROJECT_TREE.yaml
      - docs/PROJECT_TREE.md
    tested: true
    added: "2026-05-22"
    description: Pure ProjectTree routing and future Runner worktree planning metadata with no scheduler or live parallel execution.

  github_task_queue:
    status: available
    module: scripts/runner_poll_github_tasks.py
    tested: true
    added: "2026-05-19"
    description: Polls GitHub issues labeled runner:ready, executes bounded Codex tasks in per-issue worktrees, explicit allowlisted host maintenance tasks, or bounded Telegram-approved PR squash merges on Hetzner Runner, creates draft PRs for code tasks, and reports results back to GitHub.

  runner_worktree_execution:
    status: stage1_lane_metadata
    module: scripts/runner_poll_github_tasks.py
    tested: true
    live_runtime_execution: true
    added: "2026-05-22"
    description: Executes bounded normal Runner issues in per-issue git worktrees while keeping queue processing single-runner, validating reserved stage 1 task lane names for future routing, and preserving separate allowlisted host maintenance dispatch.

  notebooklm_sourcepack:
    status: available
    module: scripts/build_notebooklm_sourcepack.py
    tested: true
    added: "2026-05-20"
    description: Generates docs/NOTEBOOKLM_SOURCEPACK.md from repo state for NotebookLM mirror.

  helper_registry:
    status: available
    module: HELPER_REGISTRY.yaml
    tested: true
    added: "2026-05-21"
    description: Machine-readable registry of helper roles, trust levels, and capability boundaries. Separate from CAPABILITY_REGISTRY which tracks code modules.

  aufmass_engine:
    status: available
    module: core/aufmass_engine.py
    entry: calculate_aufmass
    stage: stage_1_calculation_engine
    live_runtime_execution: false
    requires:
      - schemas/aufmass_input.schema.json
      - docs/AUFMASS_ENGINE.md
    tested: true
    added: "2026-05-20"
    description: Calculates public-safe Aufmass quantities from explicit room geometry and openings.

  aufmass_manual_adapter:
    status: available
    module: core/aufmass_manual_adapter.py
    entry: calculate_manual_plan_aufmass
    stage: stage_1_manual_calibration_adapter
    live_runtime_execution: false
    requires:
      - schemas/aufmass_manual_input.schema.json
      - docs/AUFMASS_MANUAL_ADAPTER.md
      - core/aufmass_engine.py
    tested: true
    added: "2026-05-20"
    description: Converts manually calibrated drawing coordinates into metric Aufmass engine input.

  aufmass_dxf_adapter:
    status: available
    module: core/aufmass_dxf_adapter.py
    entry: extract_dxf
    stage: stage_1_dxf_extract_adapter
    live_runtime_execution: false
    requires:
      - schemas/aufmass_dxf_extract.schema.json
      - docs/AUFMASS_DXF_ADAPTER.md
    tested: true
    added: "2026-05-20"
    description: Optionally extracts public-safe DXF geometry and annotation metadata through lazy-loaded ezdxf.

  aufmass_room_matcher:
    status: available
    module: core/aufmass_room_matcher.py
    entry: match_dxf_rooms
    stage: stage_1_dxf_room_match_candidates
    live_runtime_execution: false
    requires:
      - schemas/aufmass_room_match.schema.json
      - docs/AUFMASS_ROOM_MATCHER.md
      - core/aufmass_dxf_adapter.py
    tested: true
    added: "2026-05-20"
    description: Produces deterministic room-contour match candidates from DXF extraction output without reading drawing files.

  aufmass_room_review_table:
    status: available
    module: core/aufmass_room_review.py
    entry: room_matches_to_review_table
    stage: stage_1_dxf_room_review_table
    live_runtime_execution: false
    requires:
      - schemas/aufmass_room_review.schema.json
      - docs/AUFMASS_ROOM_REVIEW_TABLE.md
      - core/aufmass_room_matcher.py
    tested: true
    added: "2026-05-21"
    description: Converts DXF room match candidates into deterministic public-safe review rows without producing official quantities.

  aufmass_exporter:
    status: available
    module: core/aufmass_exporter.py
    entry: aufmass_result_to_json_dict
    stage: stage_1_export_table
    live_runtime_execution: false
    requires:
      - schemas/aufmass_export.schema.json
      - docs/AUFMASS_EXPORTER.md
      - core/aufmass_engine.py
    tested: true
    added: "2026-05-20"
    description: Exports Aufmass results to deterministic rows, CSV text, and JSON-compatible dicts.

  aufmass_parser_dependencies_limited:
    status: available
    module: pyproject.toml
    stage: dependency_prep
    live_runtime_execution: false
    requires:
      - docs/AUFMASS_PARSERS.md
    tested: false
    added: "2026-05-20"
    description: "Optional dependency groups for the limited Aufmass parser scope: DXF via ezdxf, PDF via pdfplumber and pypdf, and image/scan helpers via pillow, opencv-python-headless, and scikit-image."

  runner_bridge:
    status: stage1_dry_run
    module: core/runner_bridge.py
    entry: dry_run_runner_bridge
    stage: stage_1_dry_run
    live_runtime_execution: false
    requires:
      - schemas/runner_bridge.schema.json
      - docs/RUNNER_BRIDGE.md
    tested: true
    description: Dry-run contract only. Validates and renders RunnerBridgeRequest. No GitHub calls, no network, no shell/subprocess. Stage 2 live requires separate operator-approved PR.

  action_gate:
    status: stage1_dry_run
    module: core/action_gate.py
    entry: validate_action_request
    stage: stage_1_dry_run
    live_runtime_execution: false
    requires:
      - schemas/action_gate.schema.json
      - docs/ACTION_GATE.md
    tested: true
    added: "2026-05-21"
    description: Dry-run validation gate for a user-approved Skeleton pull-request action bound to action type, repo, PR number, expected head SHA, and expected files.

  telegram_approval_buttons:
    status: stage1_dry_run
    module: core/telegram_approval_buttons.py
    entry: build_pr_ready_card_payload
    stage: stage_1_dry_run
    live_runtime_execution: false
    requires:
      - schemas/telegram_approval_buttons.schema.json
      - docs/TELEGRAM_APPROVAL_BUTTONS.md
      - core/action_gate.py
    tested: true
    added: "2026-05-21"
    description: Builds deterministic completed-PR Telegram review cards and validates bounded dry-run operator callbacks before any approved action-gate handoff; live callback and Runner merge handling remain separate bounded runtime stages.

  telegram_operator_event_bridge:
    status: stage1_dry_run
    module: core/telegram_operator_event_bridge.py
    entry: bridge_callback_to_operator_event
    stage: stage_1_dry_run
    live_runtime_execution: false
    requires:
      - schemas/telegram_operator_event_bridge.schema.json
      - docs/TELEGRAM_OPERATOR_EVENT_BRIDGE.md
      - core/telegram_approval_buttons.py
      - core/operator_event.py
    tested: true
    added: "2026-05-21"
    description: Converts validated Telegram callbacks and current PR state into deterministic public-safe dry-run operator event records and GitHub issue comment text.

  telegram_callback_poller:
    status: stage1_runner_merge_request
    module: scripts/telegram_callback_poller.py
    entry: poll_once
    stage: stage_1_runner_merge_request
    live_runtime_execution: true
    requires:
      - docs/TELEGRAM_CALLBACK_POLLER.md
    tested: true
    added: "2026-05-21"
    description: Reads one bounded Telegram callback update batch with a local offset file, requires an HMAC-signed PR inline button callback before live GitHub reads or audit-comment writes, suppresses replayed signed callback data locally, answers callback queries when Telegram credentials exist, posts a public-safe GitHub PR audit comment, and only for approve creates a bounded runner:ready PR squash-merge request issue.

  operator_event_record:
    status: stage1_dry_run
    module: core/operator_event.py
    entry: render_public_issue_comment
    stage: stage_1_dry_run
    live_runtime_execution: false
    requires:
      - schemas/operator_event.schema.json
      - docs/OPERATOR_EVENT_RECORD.md
    tested: true
    added: "2026-05-21"
    description: Defines a bounded public-safe dry-run operator event record and deterministic issue comment text without live audit-trail writes.

  memory_manager:
    status: stage1_dry_run
    module: core/memory_manager.py
    entry: route_memory_record
    stage: stage_1_dry_run
    live_runtime_execution: false
    requires:
      - schemas/memory_record.schema.json
      - docs/MEMORY_MANAGER.md
    tested: true
    added: "2026-05-20"
    description: Deterministic dry-run memory routing for weak cache, project state, canon candidates, confirmed canon, private-sensitive records, and rejected archive records.

  memory_store:
    status: available
    module: core/memory_store.py
    entry: append_memory_ledger_entry
    stage: stage_1_local_audit_ledger
    live_runtime_execution: false
    requires:
      - schemas/memory_store.schema.json
      - docs/MEMORY_STORE.md
      - core/memory_manager.py
    tested: true
    added: "2026-05-21"
    description: Writes an explicit-path deterministic local memory routing audit ledger and public-safe session/project state snapshots without canon promotion.

  memory_gateway:
    status: stage1_dry_run
    module: core/memory_gateway.py
    entry: MemoryGateway.execute
    stage: stage_1_synthetic_contract
    live_runtime_execution: false
    namespaces:
      - aufmass
      - bauclock
      - skeleton
      - home_automation
      - legal_private
    requires:
      - core/memory_gateway_policy.py
      - schemas/memory_gateway_request.schema.json
      - schemas/memory_gateway_response.schema.json
      - docs/MEMORY_GATEWAY.md
    tested: true
    added: "2026-06-27"
    description: Versioned synthetic gateway contract for namespace-isolated exact memory, derived semantic/code-graph retrieval, freshness metadata, audit metadata, conflict/override separation, and PatchProposal-only writes.

  codex_runtime_preflight:
    status: planned
    module: scripts/runner_poll_github_tasks.py
    tested: false
    live_runtime_execution: true
    added: "2026-06-08"
    description: Planned Runner/Codex preflight to verify execution user, authentication, supported ChatGPT-account Codex model, and quota availability before starting Codex tasks.

  hermes_quota_aware_review:
    status: planned
    module: PROVIDER_ROUTING.yaml
    tested: false
    live_runtime_execution: false
    added: "2026-06-08"
    description: Planned Hermes provider policy requiring bounded audit packets, usage-limit stop rules, compact snapshots, no full queue or repo scans by default, and no executor authority.

  alternative_provider_backlog:
    status: planned
    module: PROVIDER_ROUTING.yaml
    tested: false
    live_runtime_execution: false
    added: "2026-06-08"
    description: Planned backlog track for Gemini as read-only reviewer/auditor and Antigravity as lab-only worker candidate, with no direct merge, deploy, secrets, runtime, or queue execution authority.

  memory_manager_live_storage:
    status: planned
    module: core/memory_manager_live_storage.py
    tested: false
    live_runtime_execution: false
    description: Future operator-approved live storage bridge for memory routing decisions; not implemented in stage 1.
