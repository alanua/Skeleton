version: "1.0.0"
default_project: skeleton
projects:
  skeleton:
    repo: alanua/Skeleton
    checkout_path: /home/agent/agent-dev/repos/Skeleton
    worktree_root: /home/agent/agent-dev/worktrees/skeleton
    public: true
    runner_enabled: true
    execution_modes:
      planning_only: false
      codex_issue_worktree: true
      live_cross_repo: false
    requires_explicit_approval_for_mode_change: true
    future_parallel_worktrees: true
    runtime_approval_required: false
    worktree_name_prefix: skeleton
    description: Public Skeleton control and construction repository.

  bauclock:
    repo: alanua/bauclock
    checkout_path: /home/agent/agent-dev/worktrees/bauclock/main
    worktree_root: /home/agent/agent-dev/worktrees/bauclock
    public: true
    runner_enabled: true
    execution_modes:
      planning_only: true
      codex_issue_worktree: false
      live_cross_repo: false
    requires_explicit_approval_for_mode_change: true
    future_parallel_worktrees: true
    runtime_approval_required: true
    worktree_name_prefix: bauclock
    description: Public BauClock project registered for future Runner routing.

  lavalamp:
    repo: alanua/Lavalamp
    checkout_path: /home/agent/agent-dev/worktrees/lavalamp/main
    worktree_root: /home/agent/agent-dev/worktrees/lavalamp
    public: true
    runner_enabled: true
    execution_modes:
      planning_only: true
      codex_issue_worktree: false
      live_cross_repo: false
    requires_explicit_approval_for_mode_change: true
    future_parallel_worktrees: true
    runtime_approval_required: true
    worktree_name_prefix: lavalamp
    description: Public Lavalamp project registered for future Runner routing.

  aufmass_private:
    repo: private/aufmass
    checkout_path: /home/agent/agent-dev/worktrees/aufmass-private/main
    worktree_root: /home/agent/agent-dev/worktrees/aufmass-private
    public: false
    runner_enabled: false
    execution_modes:
      planning_only: true
      codex_issue_worktree: false
      live_cross_repo: false
    requires_explicit_approval_for_mode_change: true
    future_parallel_worktrees: false
    runtime_approval_required: true
    worktree_name_prefix: aufmass-private
    description: Private Aufmass route kept outside public Skeleton artifacts.

  home_automation:
    repo: private/home-automation
    checkout_path: /home/agent/agent-dev/worktrees/home-automation/main
    worktree_root: /home/agent/agent-dev/worktrees/home-automation
    public: false
    runner_enabled: false
    execution_modes:
      planning_only: true
      codex_issue_worktree: false
      live_cross_repo: false
    requires_explicit_approval_for_mode_change: true
    future_parallel_worktrees: false
    runtime_approval_required: true
    worktree_name_prefix: home-automation
    description: Private home automation route requiring runtime approval.
