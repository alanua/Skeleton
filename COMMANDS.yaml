schema: skeleton.commands.v1
status: DRAFT_ACTIVE_CANDIDATE

behavior_playbook:
  routine_safe_helper_steps:
    trigger: approved_helper_step_is_same_scope_read_only_or_current_scope_only_and_not_risky
    safe_next_step: run_smallest_safe_helper_step_without_extra_plus
    report: short_human_readable_status_result_next_safe_step
  blocked_long_task_creation:
    trigger: long_task_creation_blocked_by_missing_detail_size_or_unsafe_ambiguity
    safe_next_step: create_short_public_safe_issue_for_first_unblocker
    report: short_human_readable_issue_reference_blocker_next_safe_step
  repeated_work_pattern:
    trigger: same_type_routine_items_share_approved_route_scope_risk_level_and_gate
    safe_next_step: process_as_batch_split_and_stop_on_different_or_risky_item
    report: short_human_readable_processed_split_blocked_validation_summary
  skeleton_freshness_check:
    trigger: before_skeleton_project_work_or_after_recent_main_merge
    safe_next_step: compare_github_main_runner_checkout_sourcepack_and_open_work
    report: short_human_readable_fresh_stale_blocked_summary
  adaptive_practical_learning:
    trigger: repeated_blocker_or_repeated_failed_route_or_fixuy_with_adapt_instruction
    safe_next_step: classify_route_change_next_action_and_repair_real_blocker_before_repeating
    report: classification_route_done_next_practical_step
  issue_or_pr_number_review:
    trigger: operator_provides_issue_or_pr_number
    safe_next_step: read_scope_tests_data_runtime_risk_then_approve_reject_or_state_blocker_and_one_next_step
    report: short_review_decision_with_reason

commands:
  прокинься:
    mode: boot
    boot_level: L1
    loads:
      - BOOT_MANIFEST.yaml
    produces:
      - BootReport
    writes: none

  СК:
    mode: project
    boot_level: L2
    project: skeleton
    loads:
      - BOOT_MANIFEST.yaml
      - PROJECT_INDEX.yaml
      - projects/skeleton/PROJECT_MANIFEST.yaml
    produces:
      - ProjectContextReport
    writes: none

  СК-свіжість:
    mode: audit
    boot_level: L4
    project: skeleton
    loads:
      - BOOT_MANIFEST.yaml
      - PROJECT_INDEX.yaml
      - projects/skeleton/PROJECT_MANIFEST.yaml
      - projects/skeleton/PROJECT_OPERATING_STANDARD.md
      - docs/RUNNER_MAINTENANCE_TASKS.md
      - docs/NOTEBOOKLM_SOURCEPACK.md
      - GitHub_main_status
      - Runner_checkout_status
      - open_PRs_and_issues
    produces:
      - SkeletonFreshnessReport
    writes: none
    means:
      - GitHub_main_is_source_of_truth
      - check_live_runner_checkout_sync_after_recent_merges
      - check_notebooklm_sourcepack_freshness_when_relevant
      - flag_open_prs_or_issues_stale_relative_to_main
      - old_chats_and_old_branches_are_not_canon
      - keep_report_short_human_readable

  ДЖ:
    mode: project
    boot_level: L2
    project: jeeves
    loads:
      - BOOT_MANIFEST.yaml
      - PROJECT_INDEX.yaml
      - projects/jeeves/PROJECT_MANIFEST.yaml
    produces:
      - ProjectContextReport
    writes: none

  АУД:
    mode: audit
    boot_level: L4
    loads:
      - BOOT_MANIFEST.yaml
      - audit_scope
    produces:
      - AuditReport
      - PatchPlan_when_requested
    writes: report_only_by_default

  КОД:
    mode: code_task
    boot_level: L2
    default_route: runner_issue_or_TASK_PACKET
    loads:
      - BOOT_MANIFEST.yaml
      - PROJECT_INDEX.yaml
      - selected_project_manifest
    produces:
      - RunnerTask
    writes: task_artifact_only_after_scope_check

  БЗ:
    mode: canon_write
    boot_level: L4
    default_route: knowledge_intake
    loads:
      - BOOT_MANIFEST.yaml
      - target_file
      - active_rules
    produces:
      - Critique
      - PatchPlan
      - VerificationReport
    writes: after_explicit_approval_only
    gates:
      - read_target
      - critique
      - patch_plan
      - explicit_approval
      - write
      - verify
    means:
      - transcript_article_sourcepack_external_analysis_defaults_to_knowledge_intake
      - public_safe_durable_entries_are_REVIEW_BACKLOG_REJECTED_only
      - approved_public_safe_review_queue_writes_may_use_Runner_Inbox_route
      - no_automatic_CANON_promotion
      - private_data_secrets_deploy_runtime_never_through_public_Runner_Inbox

  зафіксуй:
    mode: persist_request
    boot_level: L4
    loads:
      - BOOT_MANIFEST.yaml
      - MEMORY_ROUTING.yaml
      - SOURCE_REGISTRY.yaml
      - requested_instruction_change
    produces:
      - PersistenceClassification
      - RouteDecision
      - CritiqueOrPatchPlan
      - VerificationReport
    writes: routed_durable_storage_after_write_gate
    means:
      - explicit_durable_persistence_request
      - fixuy_is_memory_routing_event
      - classify_then_route_then_change_next_action
      - fixation_without_changed_next_action_does_not_count
      - use_memory_manager_and_memory_store_stage1_model_when_available
      - fixuy_is_enough_approval_to_record_stated_rule_after_classification
      - classify_CANON_REVIEW_BACKLOG_REJECTED_PRIVATE_TEMPORARY
      - route_public_safe_durable_to_GitHub_canon_review_without_extra_plus
      - route_private_context_privately
      - secrets_never_to_chat_GitHub_plain_Drive
      - risky_actions_merge_deploy_runtime_secrets_destructive_require_separate_explicit_approval
      - report_classification_route_done_next_practical_step

  фіксуй:
    mode: persist_request
    boot_level: L4
    loads:
      - BOOT_MANIFEST.yaml
      - MEMORY_ROUTING.yaml
      - SOURCE_REGISTRY.yaml
      - requested_instruction_change
    produces:
      - PersistenceClassification
      - RouteDecision
      - CritiqueOrPatchPlan
      - VerificationReport
    writes: routed_durable_storage_after_write_gate
    means:
      - explicit_durable_persistence_request
      - fixuy_is_memory_routing_event
      - classify_then_route_then_change_next_action
      - fixation_without_changed_next_action_does_not_count
      - use_memory_manager_and_memory_store_stage1_model_when_available
      - fixuy_is_enough_approval_to_record_stated_rule_after_classification
      - classify_CANON_REVIEW_BACKLOG_REJECTED_PRIVATE_TEMPORARY
      - route_public_safe_durable_to_GitHub_canon_review_without_extra_plus
      - route_private_context_privately
      - secrets_never_to_chat_GitHub_plain_Drive
      - risky_actions_merge_deploy_runtime_secrets_destructive_require_separate_explicit_approval
      - report_classification_route_done_next_practical_step

  '+':
    mode: continue_approved_step
    boot_level: current
    loads:
      - current_approved_context
    produces:
      - StepResult
    writes: current_scope_only
    rule: apply_smallest_approved_next_step
    means:
      - continue_already_proposed_safe_next_step
      - plus_continues_active_route_only
      - plus_does_not_authorize_new_durable_write_or_route_bypass
      - do_not_replan_unless_new_evidence_changes_route
      - stay_inside_current_scope_risk_and_gate
      - report_classification_route_done_next_practical_step

  пакетно:
    mode: batch_continue_approved_route
    boot_level: current
    loads:
      - current_approved_context
      - approved_batch_items
    produces:
      - BatchStepResults
      - SplitOutItems
      - VerificationReport
    writes: current_scope_only_after_required_gates
    rule: same_type_routine_tasks_only_same_approved_route_scope_risk_gate
    means:
      - allowed_only_for_same_type_routine_tasks
      - require_same_approved_route_scope_risk_level_and_gate
      - batch_saves_time_only_inside_existing_approved_gate
      - no_batch_merge_deploy_secrets_runtime_canon_instruction_promotion_unless_explicitly_approved
      - split_and_stop_if_any_item_differs
      - report_processed_split_blocked_validation_summary
