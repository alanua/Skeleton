name: Issue 1149 bounded patch

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.number == 1168
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: runner/issue-1149
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install 'pytest>=8' 'PyYAML>=6'
      - run: python scripts/apply_issue_1149_patch.py
      - run: rm scripts/apply_issue_1149_patch.py .github/workflows/issue-1149-execute.yml
      - run: python -m pytest -q tests/test_runner_poll_github_tasks.py -k 'maintenance or codex_task_result'
      - run: python -m pytest tests/test_runner_poll_github_tasks.py -x -vv
      - run: python -m pytest -q
      - run: git diff --check
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'fix: harden maintenance report sanitizer'
          git push origin HEAD:runner/issue-1149
