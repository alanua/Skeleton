name: Probe Hetzner SSH deploy boundary

on:
  pull_request:
    paths:
      - '.github/workflows/hetzner-page-publisher-bootstrap.yml'

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
      HETZNER_SERVER: ${{ secrets.HETZNER_SERVER }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      HETZNER_USER: ${{ secrets.HETZNER_USER }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SSH_USER: ${{ secrets.SSH_USER }}
      HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
      HETZNER_SSH_PRIVATE_KEY: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      HETZNER_SSH_PORT: ${{ secrets.HETZNER_SSH_PORT }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
    steps:
      - name: Report only configured secret names
        shell: bash
        run: |
          set -euo pipefail
          host=false
          user=false
          key=false
          port=false
          for name in HETZNER_HOST HETZNER_SERVER SERVER_HOST SSH_HOST; do
            if [ -n "${!name:-}" ]; then echo "$name=configured"; host=true; fi
          done
          for name in HETZNER_USER SERVER_USER SSH_USER; do
            if [ -n "${!name:-}" ]; then echo "$name=configured"; user=true; fi
          done
          for name in HETZNER_SSH_KEY HETZNER_SSH_PRIVATE_KEY SSH_PRIVATE_KEY SERVER_SSH_KEY DEPLOY_SSH_KEY; do
            if [ -n "${!name:-}" ]; then echo "$name=configured"; key=true; fi
          done
          for name in HETZNER_SSH_PORT SSH_PORT; do
            if [ -n "${!name:-}" ]; then echo "$name=configured"; port=true; fi
          done
          echo "ssh_host_configured=$host"
          echo "ssh_user_configured=$user"
          echo "ssh_key_configured=$key"
          echo "ssh_port_configured=$port"
          if [ "$host" != true ] || [ "$key" != true ]; then exit 1; fi
