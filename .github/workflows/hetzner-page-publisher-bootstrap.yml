name: Hetzner Page Publisher bootstrap

on:
  pull_request:
    paths:
      - '.github/workflows/hetzner-page-publisher-bootstrap.yml'

permissions:
  contents: read

jobs:
  probe:
    runs-on: [self-hosted, linux, x64, hetzner-agent-runner-1]
    timeout-minutes: 5
    steps:
      - name: Verify bounded Hetzner runner identity
        shell: bash
        run: |
          set -euo pipefail
          test "$(id -un)" = "agent"
          test -d /home/agent/agent-dev
          test -d /home/agent/agent-dev/repos/skeleton
          printf 'runner_identity_sha256=%s\n' "$(printf '%s' "$(hostname)" | sha256sum | awk '{print $1}')"
          echo 'bootstrap_probe=READY'
