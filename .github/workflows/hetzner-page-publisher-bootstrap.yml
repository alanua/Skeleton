name: Probe Tailscale deploy boundary

on:
  pull_request:
    paths:
      - '.github/workflows/hetzner-page-publisher-bootstrap.yml'

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
      TAILSCALE_OAUTH_CLIENT_ID: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
      TAILSCALE_OAUTH_CLIENT_SECRET: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
      TS_AUTHKEY: ${{ secrets.TS_AUTHKEY }}
      TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
    steps:
      - name: Report only configured secret names
        shell: bash
        run: |
          set -euo pipefail
          oauth_id=false
          oauth_secret=false
          authkey=false
          for name in TS_OAUTH_CLIENT_ID TAILSCALE_OAUTH_CLIENT_ID; do
            if [ -n "${!name:-}" ]; then echo "$name=configured"; oauth_id=true; fi
          done
          for name in TS_OAUTH_SECRET TAILSCALE_OAUTH_CLIENT_SECRET; do
            if [ -n "${!name:-}" ]; then echo "$name=configured"; oauth_secret=true; fi
          done
          for name in TS_AUTHKEY TAILSCALE_AUTHKEY; do
            if [ -n "${!name:-}" ]; then echo "$name=configured"; authkey=true; fi
          done
          echo "tailscale_oauth_configured=$([ "$oauth_id" = true ] && [ "$oauth_secret" = true ] && echo true || echo false)"
          echo "tailscale_authkey_configured=$authkey"
          if [ "$authkey" != true ] && { [ "$oauth_id" != true ] || [ "$oauth_secret" != true ]; }; then exit 1; fi
