name: Probe Hetzner deploy boundary

on:
  pull_request:
    paths:
      - '.github/workflows/hetzner-page-publisher-bootstrap.yml'

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      HETZNER_SSH_PRIVATE_KEY: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}
      HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
      HETZNER_AGENT_RUNNER_SSH_KEY: ${{ secrets.HETZNER_AGENT_RUNNER_SSH_KEY }}
      JEEVES_SSH_KEY: ${{ secrets.JEEVES_SSH_KEY }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      HETZNER_KNOWN_HOSTS: ${{ secrets.HETZNER_KNOWN_HOSTS }}
      SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
    steps:
      - name: Report only configured secret names
        shell: bash
        run: |
          set -euo pipefail
          key_found=false
          for name in HETZNER_SSH_PRIVATE_KEY HETZNER_SSH_KEY HETZNER_AGENT_RUNNER_SSH_KEY JEEVES_SSH_KEY DEPLOY_SSH_KEY SERVER_SSH_KEY SSH_PRIVATE_KEY; do
            if [ -n "${!name:-}" ]; then
              echo "$name=configured"
              key_found=true
            fi
          done
          known_hosts_found=false
          for name in HETZNER_KNOWN_HOSTS SSH_KNOWN_HOSTS; do
            if [ -n "${!name:-}" ]; then
              echo "$name=configured"
              known_hosts_found=true
            fi
          done
          echo "ssh_key_configured=$key_found"
          echo "known_hosts_configured=$known_hosts_found"
          test "$key_found" = true
