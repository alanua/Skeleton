name: Issue 1118 bounded manual repair

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.number == 1167
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: runner/issue-1118
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install exact geometry profile
        run: python -m pip install 'PyYAML>=6' 'pytest>=8' 'jsonschema>=4.22,<5' 'numpy==2.4.6' 'ezdxf==1.4.4' 'shapely==2.1.2' 'networkx==3.6.1' 'pillow==12.2.0'
      - name: Apply bounded repair
        run: python scripts/apply_issue_1118_manual_patch.py
      - name: Remove temporary patch files
        run: rm scripts/apply_issue_1118_manual_patch.py .github/workflows/issue-1118-manual-finalize.yml
      - name: Verify bounded worktree diff
        run: python -c "import subprocess; changed=set(subprocess.check_output(['git','diff','--name-only'], text=True).splitlines()); expected={'core/aufmass_geometry/facade.py','tests/test_aufmass_geometry_core2d.py','scripts/apply_issue_1118_manual_patch.py','.github/workflows/issue-1118-manual-finalize.yml'}; assert changed == expected, (changed, expected)"
      - name: Geometry and DXF tests
        run: python -m pytest -q tests/test_aufmass_geometry_core2d.py --junitxml=/tmp/aufmass.xml
      - name: Enforce zero skipped geometry tests
        run: python -c "import xml.etree.ElementTree as ET; root=ET.parse('/tmp/aufmass.xml').getroot(); skipped=sum(int(s.get('skipped','0')) for s in ([root] if root.tag=='testsuite' else root.findall('testsuite'))); assert skipped == 0, skipped"
      - name: Healthcheck
        run: python scripts/aufmass_geometry_healthcheck.py
      - name: Synthetic benchmark
        run: python scripts/aufmass_geometry_benchmark.py --synthetic
      - name: Full test suite
        run: python -m pytest -q
      - name: Diff check
        run: git diff --check
      - name: Commit validated repair
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'fix: make Aufmass repair evidence deterministic'
          git push origin HEAD:runner/issue-1118
