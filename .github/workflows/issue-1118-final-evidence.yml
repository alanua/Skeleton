name: Issue 1118 final validation evidence

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  validate:
    if: github.event.pull_request.number == 1167
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: runner/issue-1118
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install exact geometry profile
        run: python -m pip install 'PyYAML>=6' 'pytest>=8' 'jsonschema>=4.22,<5' 'numpy==2.4.6' 'ezdxf==1.4.4' 'shapely==2.1.2' 'networkx==3.6.1' 'pillow==12.2.0'
      - name: Geometry and DXF suite
        run: python -m pytest -q tests/test_aufmass_geometry_core2d.py --junitxml=/tmp/geometry.xml
      - name: Healthcheck
        run: python scripts/aufmass_geometry_healthcheck.py
      - name: Synthetic benchmark
        run: python scripts/aufmass_geometry_benchmark.py --synthetic
      - name: Full suite
        run: python -m pytest -q --junitxml=/tmp/full.xml
      - name: Diff check
        run: git diff --check
      - uses: actions/upload-artifact@v4
        with:
          name: issue-1118-final-validation
          path: |
            /tmp/geometry.xml
            /tmp/full.xml
