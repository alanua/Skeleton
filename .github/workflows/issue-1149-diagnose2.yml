name: Issue 1149 diagnose patch v2

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.event.pull_request.number == 1168
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: runner/issue-1149
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -q 'pytest>=8' 'PyYAML>=6'
      - run: python scripts/apply_issue_1149_patch.py
      - run: python -c "from pathlib import Path; p=Path('tests/test_runner_poll_github_tasks.py'); x=p.read_text().splitlines(); x[3871]=x[3871].replace(' in report',' not in report'); x[3872]=x[3872].replace(' in report',' not in report'); p.write_text(chr(10).join(x)+chr(10))"
      - continue-on-error: true
        run: python -m pytest tests/test_runner_poll_github_tasks.py -x --junitxml=diagnose2.xml
      - uses: actions/upload-artifact@v4
        with:
          name: issue-1149-diagnose2
          path: diagnose2.xml
