name: Universal Runner validation

on:
  pull_request:
    paths:
      - "core/**"
      - "scripts/**"
      - "schemas/**"
      - "tests/**"
      - "pyproject.toml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused-pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: >-
          python -m pip install -q --disable-pip-version-check
          pytest pyyaml jsonschema
      - run: >-
          python -m pytest -q
          tests/test_governed_runtime.py
          tests/test_task_rollback.py
          tests/test_runtime_context_loader.py
          tests/test_task_envelope_queue.py
          tests/test_isolated_process_executor.py
          tests/test_task_risk_policy.py
          tests/test_task_reference.py

  full-pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: >-
          python -m pip install -q --disable-pip-version-check
          pytest pyyaml jsonschema
          numpy==2.4.6 ezdxf==1.4.4 shapely==2.1.2
          networkx==3.6.1 pillow==12.2.0
      - name: Run full pytest
        shell: bash
        run: |
          set +e
          python -m pytest -q > pytest-output.txt 2>&1
          echo "$?" > pytest-exit-code.txt
          exit 0
      - name: Upload pytest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: universal-runner-pytest
          path: |
            pytest-output.txt
            pytest-exit-code.txt
          if-no-files-found: error
      - name: Enforce full pytest result
        shell: bash
        run: test "$(cat pytest-exit-code.txt)" -eq 0
