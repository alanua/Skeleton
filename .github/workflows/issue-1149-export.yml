name: Issue 1149 final clean commit

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.number == 1168
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: runner/issue-1149
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -q 'pytest>=8' 'PyYAML>=6'
      - run: python scripts/apply_issue_1149_patch.py
      - run: base64 -d .github/issue-1149-finalizer.gz.b64 | gzip -d > /tmp/finalize_issue_1149.py
      - run: python /tmp/finalize_issue_1149.py
      - run: rm -f .github/issue-1149-finalizer.gz.b64 .github/workflows/issue-1149-diagnose2.yml .github/workflows/issue-1149-diagnose3.yml .github/workflows/issue-1149-diagnose4.yml .github/workflows/issue-1149-execute.yml .github/workflows/issue-1149-export.yml .github/workflows/issue-1149-finalize.yml scripts/apply_issue_1149_patch.py
      - run: python -m pytest -q tests/test_runner_poll_github_tasks.py -k 'maintenance or codex_task_result'
      - run: python -m pytest -q tests/test_runner_poll_github_tasks.py
      - run: python -m pytest -q
      - run: git diff --check
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'fix: harden maintenance report sanitizer'
          git push origin HEAD:runner/issue-1149
