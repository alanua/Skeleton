name: Issue 1149 export git checkout

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  export:
    if: github.event.pull_request.number == 1168
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: runner/issue-1149
          fetch-depth: 1
          show-progress: false
          persist-credentials: false
      - run: tar -czf /tmp/skeleton-git-checkout.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: issue-1149-git-checkout
          path: /tmp/skeleton-git-checkout.tar.gz
