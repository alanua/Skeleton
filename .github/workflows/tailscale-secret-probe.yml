name: Tailscale secret probe

on:
  pull_request:
    paths:
      - '.github/workflows/tailscale-secret-probe.yml'

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
      TAILSCALE_OAUTH_CLIENT_ID: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
      TAILSCALE_OAUTH_SECRET: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
      TS_AUTHKEY: ${{ secrets.TS_AUTHKEY }}
      TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
      HETZNER_SSH_PRIVATE_KEY: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
    steps:
      - name: Report configured secret slots only
        shell: bash
        run: |
          set -euo pipefail
          present() { if [[ -n "${!1:-}" ]]; then echo "$1=true"; else echo "$1=false"; fi; }
          present TS_OAUTH_CLIENT_ID
          present TS_OAUTH_SECRET
          present TAILSCALE_OAUTH_CLIENT_ID
          present TAILSCALE_OAUTH_SECRET
          present TS_AUTHKEY
          present TAILSCALE_AUTHKEY
          present HETZNER_SSH_PRIVATE_KEY
          present SSH_PRIVATE_KEY
          if [[ -n "${TS_AUTHKEY:-}${TAILSCALE_AUTHKEY:-}" ]] || \
             { [[ -n "${TS_OAUTH_CLIENT_ID:-}${TAILSCALE_OAUTH_CLIENT_ID:-}" ]] && [[ -n "${TS_OAUTH_SECRET:-}${TAILSCALE_OAUTH_SECRET:-}" ]]; }; then
            echo 'tailscale_credentials_available=true'
          else
            echo 'tailscale_credentials_available=false'
            exit 2
          fi
