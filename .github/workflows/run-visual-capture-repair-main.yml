name: Temporary visual capture branch repair

# second push intentionally triggers the already-installed workflow
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/run-visual-capture-repair-main.yml

permissions:
  contents: write

jobs:
  repair:
    if: github.repository == 'alanua/Skeleton'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: runner/issue-1630
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Execute fixed reviewed branch repair
        shell: bash
        env:
          FEATURE_HEAD: 3ed883cd6b1fd77f9f728e91f74d0b32aed4164d
          PRIOR_FULL_HEAD: 1f6c0463682f7c36a8b3f3e44182571d8323ee19
          REQUIRED_MAIN_ANCESTOR: f6588f1716418324ceb8a8abb475ca39ca9936f1
          TARGET_BRANCH: runner/issue-1630
        run: |
          set -euo pipefail
          git fetch --no-tags origin main runner/issue-1630
          python - <<'PY'
          from __future__ import annotations

          import os
          import subprocess

          source_commit = "920f2b3b20af314a8b86d2372b6b79e68fbe6192"
          workflow_path = ".github/workflows/self-repair-visual-capture-pr1638.yml"
          previous = subprocess.check_output(
              ["git", "show", f"{source_commit}:{workflow_path}"], text=True
          )
          marker = "        run: |\n"
          if marker not in previous:
              raise SystemExit("reviewed repair body not found")
          body = previous.split(marker, 1)[1]
          script_lines = []
          for line in body.splitlines():
              if line.startswith("          "):
                  script_lines.append(line[10:])
              elif not line.strip():
                  script_lines.append("")
              else:
                  raise SystemExit("unexpected reviewed workflow indentation")
          script = "\n".join(script_lines) + "\n"
          script = script.replace(
              'test "$workflow_parent" = "$FEATURE_HEAD"',
              'git merge-base --is-ancestor "$FEATURE_HEAD" "$workflow_head"',
              1,
          )
          completed = subprocess.run(
              ["bash", "-lc", script],
              env=os.environ.copy(),
              check=False,
              text=True,
          )
          raise SystemExit(completed.returncode)
          PY
