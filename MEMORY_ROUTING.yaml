schema: skeleton.memory_routing.v1
status: DRAFT_ACTIVE_CANDIDATE

behavior_playbook:
  routine_safe_helper_steps:
    trigger: approved_helper_step_is_same_scope_read_only_or_current_scope_only_and_not_risky
    safe_next_step: run_smallest_safe_helper_step_without_extra_plus
    report: short_human_readable_status_result_next_safe_step
  blocked_long_task_creation:
    trigger: long_task_creation_blocked_by_missing_detail_size_or_unsafe_ambiguity
    safe_next_step: create_short_public_safe_issue_for_first_unblocker
    report: short_human_readable_issue_reference_blocker_next_safe_step
  repeated_work_pattern:
    trigger: same_type_routine_items_share_approved_route_scope_risk_level_and_gate
    safe_next_step: process_as_batch_split_and_stop_on_different_or_risky_item
    report: short_human_readable_processed_split_blocked_validation_summary
  adaptive_practical_learning:
    trigger: repeated_blocker_or_repeated_failed_route_or_fixuy_with_adapt_instruction
    safe_next_step: stop_repeating_failed_route_classify_ACTIVE_BLOCKER_repair_real_route_then_resume
    report: classification_route_done_next_practical_step

routes:
  public_safe_durable:
    target: public_github_canon
    means: reviewed durable non-sensitive canon
    fixuy_rule: record_after_classification_via_GitHub_canon_review_without_extra_plus

  private_context:
    target: private_memory
    means: useful non-public context for private work
    fixuy_rule: record_after_classification_in_private_memory

  secrets_credentials:
    target: local_encrypted_store_or_secret_manager
    means: keys, credentials, tokens, identity documents, and production secrets
    fixuy_rule: refuse_chat_GitHub_plain_storage_require_secret_manager_or_local_encrypted_route

  temporary_noise:
    target: no_persist
    means: temporary logs, transient outputs, and unreviewed noise

  archive_evidence:
    target: archive_history_recovery
    means: historical material used in audit or recovery mode

fixuy_runtime_rule:
  means:
    - fixuy_is_memory_routing_event
    - classify_then_route_then_change_next_action
    - durable_fixuy_must_use_routed_long_term_target_not_chat_only
    - fixation_without_changed_next_action_does_not_count
    - use_memory_manager_and_memory_store_stage1_model_when_available
    - report_classification_route_done_next_practical_step

conflict_rule:
  means:
    - use_SOURCE_REGISTRY_source_override_chain
    - report_conflict_before_writing
    - keep_current_user_message_as_runtime_instruction_source
    - keep_boot_manifest_as_route_truth_source
    - keep_archive_evidence_out_of_default_boot

stale_rule:
  means:
    - classify_outdated_route_text_as_ARCHIVE_REFERENCE_or_OUTDATED_REJECTED
    - keep_status_snapshots_out_of_default_boot
    - require_last_verified_for_state_files
    - use_audit_mode_for_history_recovery_and_diary_material

classification_required_for:
  - public_safe_durable
  - private_context
  - secrets_credentials
  - archive_evidence

write_gate_for:
  - public_safe_durable
  - private_context
  - archive_evidence

risky_action_rule:
  still_requires_separate_explicit_approval:
    - merge
    - deploy
    - runtime
    - secrets
    - destructive_operations
