schema: skeleton.boot_manifest.v1
status: CONFIRMED_BOOT_ROUTE

repo: alanua/Skeleton
ref: main
entrypoint: BOOT_MANIFEST.yaml

read_order:
  - BOOT_MANIFEST.yaml
  - COMMANDS.yaml
  - OPERATOR_RULES.yaml
  - MODES.yaml
  - SOURCE_REGISTRY.yaml
  - MEMORY_ROUTING.yaml
  - PROJECT_INDEX.yaml
  - STATUS_CODES.yaml

boot_visible_control_routes:
  runner_inbox_v0:
    label: Runner Inbox route
    docs:
      - docs/RUNNER_INBOX.md
      - docs/ASSISTANT_CONTROL_ROUTE.md
    target: projects/skeleton/REVIEW_QUEUE.yaml
    packet_type: append_review_queue_entries
    allowed_entry_states:
      - REVIEW
      - BACKLOG
      - REJECTED
    canon_promotion: explicit_operator_approval_required
    forbids:
      - private_data
      - secrets
      - deploy
      - runtime_changes
  runner_inbox_transport_polling_v0:
    label: Runner Inbox route
    docs:
      - docs/RUNNER_INBOX.md
      - docs/ASSISTANT_CONTROL_ROUTE.md
    transport_root: var/runner_inbox
    processes: at_most_one_packet_per_poll
    capabilities: same_as_runner_inbox_v0

boot_output:
  type: BootReport
  required_fields:
    - repo
    - ref
    - entrypoint
    - loaded_sources
    - mode
    - active_project_status
    - source_trust_map
    - writes

failure_statuses:
  repo_unavailable: BOOT_FAILED_REPO_UNAVAILABLE
  ref_unavailable: BOOT_FAILED_REF_UNAVAILABLE
  entrypoint_unavailable: BOOT_FAILED_ENTRYPOINT_UNAVAILABLE
  source_unavailable: BOOT_FAILED_SOURCE_UNAVAILABLE
  project_missing: ACTIVE_PROJECT_WAITING
  project_ambiguous: ACTIVE_PROJECT_AMBIGUOUS
