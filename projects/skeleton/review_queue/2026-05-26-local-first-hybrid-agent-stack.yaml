entries:
  - id: RQB-2026-05-26-LH-001
    source_batch: local_first_hybrid_agent_stack_transcript_2026_05_26
    classification: CANON_CANDIDATE
    priority: P0
    target_project: skeleton+jeeves
    summary: Local agents should not be treated as simply free; their real trade-offs include hardware cost, electricity, maintenance, latency, model quality, and setup complexity.
    existing_match: Reinforces provider routing, cost controls, and operator-visible telemetry ideas.
    risk: Calling local execution free can hide operational cost and cause poor architecture decisions.
    recommended_action: Keep as cost/latency/privacy framing for future provider and local-model policy.
    status: REVIEW

  - id: RQB-2026-05-26-LH-002
    source_batch: local_first_hybrid_agent_stack_transcript_2026_05_26
    classification: CANON_CANDIDATE
    priority: P0
    target_project: skeleton+jeeves
    summary: Best practical architecture is local first, cloud when needed: simple/private tasks stay local, complex non-private tasks can route to stronger cloud models.
    existing_match: Matches provider_routing direction and prior local/cloud hybrid backlog.
    risk: Poor privacy classification can leak sensitive data to cloud, while overusing local models can slow important work.
    recommended_action: Promote only with explicit privacy classification, task risk levels, and fallback rules.
    status: REVIEW

  - id: RQB-2026-05-26-LH-003
    source_batch: local_first_hybrid_agent_stack_transcript_2026_05_26
    classification: REVIEW
    priority: P1
    target_project: skeleton
    summary: Agent runtime location and LLM runtime location are separate decisions; the agent may run locally while the model runs locally, on a local server, or in cloud.
    existing_match: Related to adapter contracts, runner bridge, provider routing, and future local endpoint adapters.
    risk: Mixing agent location with model location can obscure privacy and reliability boundaries.
    recommended_action: Add to future architecture notes for runtime topology and provider routing.
    status: REVIEW

  - id: RQB-2026-05-26-LH-004
    source_batch: local_first_hybrid_agent_stack_transcript_2026_05_26
    classification: BACKLOG
    priority: P1
    target_project: homelab+jeeves
    summary: A dedicated local AI worker mini-PC can host 24/7 agents and local inference while user devices connect remotely.
    existing_match: Related to homelab Fujitsu/Proxmox/Home Assistant inventory and future local assistant node ideas.
    risk: Requires maintenance, security hardening, backups, and service monitoring.
    recommended_action: Keep as homelab/Jeeves infrastructure option; evaluate against existing Fujitsu server before buying hardware.
    status: BACKLOG

  - id: RQB-2026-05-26-LH-005
    source_batch: local_first_hybrid_agent_stack_transcript_2026_05_26
    classification: REVIEW
    priority: P1
    target_project: homelab+jeeves
    summary: Local AI stack decision has seven practical dimensions: agent host, model host, hardware, model choice, runtime, latency needs, and privacy requirements.
    existing_match: New useful checklist for local-model planning.
    risk: Incomplete planning can produce slow, unstable, or privacy-leaking setups.
    recommended_action: Store as future checklist for local AI worker evaluation.
    status: REVIEW

  - id: RQB-2026-05-26-LH-006
    source_batch: local_first_hybrid_agent_stack_transcript_2026_05_26
    classification: REVIEW/BACKLOG
    priority: P2
    target_project: skeleton+homelab
    summary: Hardware evaluation should focus on whether the model is fast enough for real agent tasks, not merely whether the agent software can run.
    existing_match: Reinforces prior local LLM assessment for Fujitsu Q558 and local model limitations.
    risk: Underpowered hardware can make tool-calling agents impractically slow.
    recommended_action: Add model benchmark and agent latency checks before adopting local inference for serious workflows.
    status: REVIEW

  - id: RQB-2026-05-26-LH-007
    source_batch: local_first_hybrid_agent_stack_transcript_2026_05_26
    classification: CANON_CANDIDATE
    priority: P1
    target_project: skeleton
    summary: Model selection should optimize for the fastest model smart enough for the task, not the largest local model available.
    existing_match: Matches provider routing principle of matching model strength to task class.
    risk: Oversized models waste latency and hardware resources; undersized models reduce quality.
    recommended_action: Keep for future provider/model selection policy.
    status: REVIEW

  - id: RQB-2026-05-26-LH-008
    source_batch: local_first_hybrid_agent_stack_transcript_2026_05_26
    classification: BACKLOG
    priority: P2
    target_project: skeleton+homelab
    summary: Model recommendation tools can help estimate suitable models from RAM, CPU, GPU, and expected tokens per second.
    existing_match: Related to future model profile registry and homelab local model selection.
    risk: Tool suggestions can be wrong or hype-driven without real workload tests.
    recommended_action: Keep as evaluation aid, but require actual local benchmark results before adoption.
    status: BACKLOG

  - id: RQB-2026-05-26-LH-009
    source_batch: local_first_hybrid_agent_stack_transcript_2026_05_26
    classification: REVIEW
    priority: P1
    target_project: skeleton+homelab
    summary: Runtime choice matters: simple local runtimes are easier, lower-level runtimes can be faster, and high-throughput runtimes need stronger hardware and deeper tuning.
    existing_match: Related to future local endpoint adapter and model profile registry.
    risk: Overly complex runtime choices can consume maintenance time and reduce reliability.
    recommended_action: Prefer simple runtimes for personal/homelab use; reserve advanced runtimes for later benchmarked needs.
    status: REVIEW

  - id: RQB-2026-05-26-LH-010
    source_batch: local_first_hybrid_agent_stack_transcript_2026_05_26
    classification: CANON_CANDIDATE
    priority: P0
    target_project: skeleton+jeeves
    summary: Token speed alone is insufficient; agent latency across tool calls, browsing, subagents, and validation loops is the real workflow metric.
    existing_match: Reinforces telemetry and journaling backlog for cost, latency, and success metrics.
    risk: Optimizing only tokens per second can miss actual task runtime and user waiting cost.
    recommended_action: Use both tokens per second and end-to-end agent latency in future telemetry.
    status: REVIEW

  - id: RQB-2026-05-26-LH-011
    source_batch: local_first_hybrid_agent_stack_transcript_2026_05_26
    classification: CANON_CANDIDATE
    priority: P0
    target_project: skeleton+jeeves
    summary: Privacy is the main reason to run local models; sensitive data, API keys, customer data, financial data, and regulated data should not be sent to cloud by default.
    existing_match: Matches MEMORY_ROUTING privacy routes, secret-handling rules, and provider routing privacy concerns.
    risk: Cloud fallback can leak private data if not classified before routing.
    recommended_action: Promote only with explicit privacy gate before cloud fallback.
    status: REVIEW

  - id: RQB-2026-05-26-LH-012
    source_batch: local_first_hybrid_agent_stack_transcript_2026_05_26
    classification: REVIEW/BACKLOG
    priority: P1
    target_project: skeleton
    summary: Routing instructions can send private or simple work to local models and complex non-private work to cloud providers.
    existing_match: Related to PROVIDER_ROUTING and task classification.
    risk: Natural-language routing rules are brittle if not enforced by machine-readable gates.
    recommended_action: Convert into machine-readable routing policy later; avoid relying only on prompt instructions.
    status: REVIEW

  - id: RQB-2026-05-26-LH-013
    source_batch: local_first_hybrid_agent_stack_transcript_2026_05_26
    classification: BACKLOG
    priority: P2
