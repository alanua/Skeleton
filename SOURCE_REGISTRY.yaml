schema: skeleton.source_registry.v1
status: DRAFT_ACTIVE_CANDIDATE

source_override_chain:
  - current_user_message
  - boot_manifest
  - public_github_canon
  - private_memory
  - chatgpt_memory
  - archive_history_recovery

sources:
  current_user_message:
    trust: runtime_direct
    means: explicit instruction in the current conversation after safety and scope checks

  boot_manifest:
    trust: canon_route
    means: declared machine-readable Skeleton startup route and active control source

  public_github_canon:
    trust: public_safe_canon_after_review
    means: reviewed public-safe durable knowledge

  private_memory:
    trust: private_working_memory
    means: non-public context in private Drive or local runner storage

  chatgpt_memory:
    trust: weak_cache
    means: compact working memory requiring verification against Skeleton repo boot/routing files for serious claims

  archive_history_recovery:
    trust: evidence_on_demand
    means: historical evidence used only in audit or recovery mode

conflict_rule:
  means:
    - compare_conflicting_sources_by_override_chain
    - report_conflict_when_sources_disagree
    - use_current_user_message_for_runtime_instruction_after_safety_scope_checks
    - use_boot_manifest_for_route_truth
    - use_Skeleton_repo_boot_routing_files_as_active_control_source
    - treat_ChatGPT_memory_as_weak_cache_not_route_truth
    - use_archive_history_recovery_as_evidence_not_active_route

roles:
  chatgpt:
    means: current host interface, reviewer, framer, memory organizer

  skeleton:
    means: model-neutral control layer for LLM-assisted work

  runner:
    means: execution bridge for bounded tasks

  codex:
    means: bounded coding executor

  gemini:
    means: auditor and second-brain role

  jeeves:
    means: separate future assistant product and runtime
