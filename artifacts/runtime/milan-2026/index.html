<!doctype html>
<html lang="uk"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex"><meta name="referrer" content="no-referrer"><meta name="theme-color" content="#f7f5f0"><title>Приватна сторінка подорожі</title><style>:root{--bg:#f7f5f0;--ink:#171717;--muted:#66645f;--accent:#ef8430}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;padding:24px}main{width:min(100%,520px);background:#fff;border:1px solid #dedbd2;border-radius:24px;padding:32px;box-shadow:0 18px 50px rgba(30,25,18,.09)}.mark{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;background:var(--ink);color:#fff;font-weight:900;margin-bottom:22px}h1{font-size:clamp(1.9rem,8vw,2.8rem);line-height:1.03;letter-spacing:-.045em;margin:0 0 14px}p{color:var(--muted);margin:0;line-height:1.6}.bar{height:8px;border-radius:99px;background:#eee9df;overflow:hidden;margin-top:28px}.bar span{display:block;width:42%;height:100%;background:var(--accent);border-radius:inherit;animation:move 1.25s ease-in-out infinite alternate}.error{display:none;margin-top:22px;padding:14px;border-radius:14px;background:#fff0e3;color:#8e4512;font-weight:700}@keyframes move{to{transform:translateX(138%)}}@media(max-width:480px){main{padding:26px 22px;border-radius:20px}}</style><script src="https://cdnjs.cloudflare.com/ajax/libs/sjcl/1.0.8/sjcl.min.js" integrity="sha512-s0r9TyYSs5CusSDL5s/QEZQZ4DNYLDXx0S/p1CfTsBRLdka+3Y5yL4Eol4Bvkm2DD9ZKGaf+d9eKyVkhmSVkeg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script></head><body><main aria-live="polite"><div class="mark" aria-hidden="true">T</div><h1>Приватна сторінка подорожі</h1><p id="status">Перевіряю захищене посилання та відкриваю сторінку…</p><div class="bar" id="bar"><span></span></div><div class="error" id="error">Посилання неповне або недійсне.</div></main><script>(()=>{'use strict';const base='https://cdn.jsdelivr.net/gh/alanua/Travel@9d97d8898f2434597ab9b48f7813ab493fe3160c/milan-2026/',files=['payload-00.txt','payload-01.txt','payload-02.txt','payload-03.txt','payload-04.txt','payload-05.txt','payload-06.txt','payload-07.txt','payload-07-tail.txt','payload-08.txt'],nonce='KhpaUZ-fKTaxC2bA',aad='travel:milan-2026:v1';const decode=s=>{s=s.replace(/\s/g,'').replace(/-/g,'+').replace(/_/g,'/');s+='='.repeat((4-s.length%4)%4);const raw=atob(s);return Uint8Array.from(raw,c=>c.charCodeAt(0));};const toBits=b=>sjcl.codec.hex.toBits(Array.from(b,x=>x.toString(16).padStart(2,'0')).join(''));const fromBits=b=>{const h=sjcl.codec.hex.fromBits(b),o=new Uint8Array(h.length/2);for(let i=0;i<o.length;i++)o[i]=parseInt(h.slice(i*2,i*2+2),16);return o;};const fail=()=>{document.getElementById('status').textContent='Доступ не підтверджено.';document.getElementById('bar').style.display='none';document.getElementById('error').style.display='block';};(async()=>{try{if(!window.sjcl)return fail();const params=new URLSearchParams(location.hash.slice(1)),keyText=params.get('k'),date=params.get('date')||'2026-10-15';if(!keyText)return fail();const keyBytes=decode(keyText);if(keyBytes.length!==32)return fail();const parts=await Promise.all(files.map(f=>fetch(base+f,{cache:'no-store',referrerPolicy:'no-referrer'}).then(r=>{if(!r.ok)throw 0;return r.text();})));const aes=new sjcl.cipher.aes(toBits(keyBytes));const plainBits=sjcl.mode.gcm.decrypt(aes,toBits(decode(parts.join(''))),toBits(decode(nonce)),sjcl.codec.utf8String.toBits(aad),128);const page=new TextDecoder().decode(fromBits(plainBits));if(!page.startsWith('<!doctype html>'))return fail();history.replaceState(null,'','#'+date);document.open();document.write(page);document.close();}catch(e){fail();}})();})();</script></body></html>
