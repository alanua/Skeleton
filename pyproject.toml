[project]
name = "skeleton-core"
version = "0.1.0"
description = "External model-neutral control layer for LLM-assisted work"
requires-python = ">=3.11"
dependencies = [
  "PyYAML>=6.0.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0.0",
]
aufmass-dxf = [
  "ezdxf",
]
aufmass-pdf = [
  "pdfplumber",
  "pypdf",
]
aufmass-ifc = [
  "ifcopenshell",
]
aufmass-image = [
  "pillow",
  "opencv-python-headless",
  "scikit-image",
]
aufmass-ocr = [
  "pytesseract",
]
aufmass-parsers = [
  "ezdxf",
  "pdfplumber",
  "pypdf",
  "ifcopenshell",
  "pillow",
  "opencv-python-headless",
  "scikit-image",
  "pytesseract",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
